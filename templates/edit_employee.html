<!DOCTYPE html>
<html>

<head>

<title>Edit Employee</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="text-center text-warning">
Edit Employee
</h2>

<form method="POST">

<div class="mb-3">

<label>Employee ID</label>

<input
type="text"
class="form-control"
value="{{ employee.id }}"
readonly>

</div>

<div class="mb-3">

<label>Name</label>

<input
type="text"
class="form-control"
name="name"
value="{{ employee.name }}"
required>

</div>

<div class="mb-3">

<label>Department</label>

<select class="form-select" name="department">

<option value="IT"
{% if employee.department=="IT" %}selected{% endif %}>
IT
</option>

<option value="HR"
{% if employee.department=="HR" %}selected{% endif %}>
HR
</option>

<option value="Finance"
{% if employee.department=="Finance" %}selected{% endif %}>
Finance
</option>

<option value="Marketing"
{% if employee.department=="Marketing" %}selected{% endif %}>
Marketing
</option>

<option value="Sales"
{% if employee.department=="Sales" %}selected{% endif %}>
Sales
</option>

<option value="DevOps"
{% if employee.department=="DevOps" %}selected{% endif %}>
DevOps
</option>

</select>

</div>

<div class="mb-3">

<label>Salary</label>

<input
type="number"
class="form-control"
name="salary"
value="{{ employee.salary }}"
required>

</div>

<button class="btn btn-primary">
Update Employee
</button>

<a href="/" class="btn btn-secondary">
Cancel
</a>

</form>

</div>

</body>

</html>
